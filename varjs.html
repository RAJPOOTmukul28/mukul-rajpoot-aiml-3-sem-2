<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js variable data type</title>
</head>
<body>
    <script>
       // string
        var name ="ABES";
     console.log(name);
     console.log(typeof(name));

     // number
     let mycot=967967356474;
     console.log(mycot);
     console.log(typeof(mycot));

     //boolen
     let coursedone=false;
     console.log(coursedone);
     console.log(typeof(coursedone));

     // null
     let add=null;
     console.log(add);
     console.log(typeof(add));

     // undefined
      let email;
      console.log(email);
      console.log(typeof(email));

      //bigint
      let bigamount=BigInt(97646330634264);
    console.log(bigamount);
    console.log(typeof(bigamount));

    // symbol 
    let val1=Symbol("HELLO");
    let val2=Symbol("HELLO");
    console.log(val1==val2);
    console.log(typeof(val1));

    // refrence of non-primitive:defined in key or value
    //object{}, function(), array[]

    let myInfo={
        name:"Mukul",
        mobile:9221451, 
        isMarried:false,
         eMail:"abhay123@gmail.com",
        address:null
     }
     // access object's key
     console.log(myInfo);
     console.log(myInfo.name);

     function hello() {
        let myName="ABES";
        console.log(myName);
        console.log(typeof(hello));
     }
     hello();

     //array
     let students=["name1,name2,name3"];
     console.log(students[0]);













    </script>
</body>
</html>
